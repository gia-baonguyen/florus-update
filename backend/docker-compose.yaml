version: '3.8'

services:
  # Oracle Database (using gvenzl/oracle-xe for lightweight development)
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: florus-oracle
    environment:
      - ORACLE_PASSWORD=oracle123
      - APP_USER=florus
      - APP_USER_PASSWORD=florus123
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - florus-network

  # Go API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: florus-api
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - DB_HOST=oracle
      - DB_PORT=1521
      - DB_USER=florus
      - DB_PASSWORD=florus123
      - DB_SERVICE=XEPDB1
      - JWT_SECRET=${JWT_SECRET:-florus-jwt-secret-key-production}
      - JWT_EXPIRATION_HOURS=24
      - JWT_ISSUER=florus-api
    ports:
      - "8080:8080"
    depends_on:
      oracle:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - florus-network

  # MinIO Object Storage for images
  minio:
    image: minio/minio:latest
    container_name: florus-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - florus-network

  # Alternative: SQLite version (no Oracle dependency)
  api-sqlite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: florus-api-sqlite
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - JWT_SECRET=${JWT_SECRET:-florus-jwt-secret-key-production}
      - JWT_EXPIRATION_HOURS=24
      - JWT_ISSUER=florus-api
    ports:
      - "8081:8080"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    networks:
      - florus-network
    profiles:
      - sqlite

volumes:
  oracle_data:
  sqlite_data:
  minio_data:

networks:
  florus-network:
    driver: bridge
