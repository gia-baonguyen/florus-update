name: CI Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/florus-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/florus-frontend

jobs:
  # ==================== DETECT CHANGES ====================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ==================== BACKEND ====================
  backend-build:
    name: Backend Build & Push
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' && github.event_name == 'push'
    permissions:
      contents: write
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=v
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kustomize image tag (Staging)
        if: github.ref == 'refs/heads/main'
        run: |
          cd k8s/overlays/staging
          # Get the SHA tag (7 chars to match docker/metadata-action format)
          IMAGE_TAG="v$(echo ${{ github.sha }} | cut -c1-7)"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}"

          # Update kustomization.yaml - both newName and newTag
          sed -i "s|newName: .*florus-backend.*|newName: ${FULL_IMAGE}|" kustomization.yaml
          sed -i "s|newTag: v.*|newTag: ${IMAGE_TAG}  # Updated by CI/CD pipeline|" kustomization.yaml

          echo "Updated backend image to: ${FULL_IMAGE}:${IMAGE_TAG}"
          cat kustomization.yaml

      - name: Commit and push manifest changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s/overlays/staging/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update backend image to v${{ github.sha }}"
          git push

  # ==================== FRONTEND ====================
  frontend-build:
    name: Frontend Build & Push
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' && github.event_name == 'push'
    permissions:
      contents: write
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=v
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=/api

      - name: Update Kustomize image tag (Staging)
        if: github.ref == 'refs/heads/main'
        run: |
          cd k8s/overlays/staging
          # Get the SHA tag (7 chars to match docker/metadata-action format)
          IMAGE_TAG="v$(echo ${{ github.sha }} | cut -c1-7)"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}"

          # Update frontend image in kustomization.yaml
          sed -i "s|name: florus-frontend|name: florus-frontend|; /name: florus-frontend/{n;s|newName:.*|newName: ${FULL_IMAGE}|;n;s|newTag:.*|newTag: ${IMAGE_TAG}  # Updated by CI/CD pipeline|}" kustomization.yaml

      - name: Commit and push manifest changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s/overlays/staging/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update frontend image to v${{ github.sha }}"
          git push

  # ==================== NOTIFY ARGOCD ====================
  notify-argocd:
    name: Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: always() && github.ref == 'refs/heads/main' && (needs.backend-build.result == 'success' || needs.frontend-build.result == 'success')

    steps:
      - name: Notify completion
        run: |
          echo "✅ CI Pipeline completed!"
          echo "ArgoCD will automatically sync the new images from Git"
          echo ""
          echo "Backend: ${{ needs.backend-build.outputs.image_tag || 'no changes' }}"
          echo "Frontend: ${{ needs.frontend-build.outputs.image_tag || 'no changes' }}"
