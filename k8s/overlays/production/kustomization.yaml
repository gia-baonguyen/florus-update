apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: florus

resources:
  - ../../base
  - ../../data
  - ../../apps
  - hpa.yaml
  - pdb.yaml

commonLabels:
  environment: production

images:
  - name: florus-backend
    newName: ghcr.io/your-org/florus-backend
    newTag: latest
  - name: florus-frontend
    newName: ghcr.io/your-org/florus-frontend
    newTag: latest

replicas:
  - name: backend
    count: 3
  - name: frontend
    count: 2

patches:
  # Production resource limits
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m

  # Add anti-affinity for high availability
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app: backend
                  topologyKey: kubernetes.io/hostname

configMapGenerator:
  - name: florus-config
    behavior: merge
    literals:
      - LOG_LEVEL=info
      - GIN_MODE=release
