apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging uses separate namespace
namespace: florus-staging

resources:
  - namespace.yaml
  - ../../apps

commonLabels:
  environment: staging

images:
  - name: florus-backend
    newName: ghcr.io/gia-baonguyen/florus-backend
    newTag: v1752d3d  # Updated by CI/CD pipeline
  - name: florus-frontend
    newName: florus-frontend
    newTag: local

replicas:
  - name: backend
    count: 1
  - name: frontend
    count: 1

patches:
  # Staging: reduced resources + fix references + enable image pull
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: florus-staging-config
      - op: replace
        path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
        value: florus-staging-secrets
      - op: replace
        path: /spec/template/spec/containers/0/env/1/valueFrom/secretKeyRef/name
        value: florus-staging-secrets
      - op: replace
        path: /spec/template/spec/containers/0/env/2/valueFrom/secretKeyRef/name
        value: florus-staging-secrets
      - op: replace
        path: /spec/template/spec/containers/0/env/3/valueFrom/secretKeyRef/name
        value: florus-staging-secrets
      - op: replace
        path: /spec/template/spec/containers/0/env/4/valueFrom/secretKeyRef/name
        value: florus-staging-secrets
  # Change NodePort for staging
  - target:
      kind: Service
      name: backend-external
    patch: |
      - op: replace
        path: /spec/ports/0/nodePort
        value: 30181
  - target:
      kind: Service
      name: frontend-external
    patch: |
      - op: replace
        path: /spec/ports/0/nodePort
        value: 30180

configMapGenerator:
  - name: florus-staging-config
    literals:
      - SERVER_PORT=8081
      - SERVER_MODE=debug
      - DB_ENABLED=false
      - REDIS_HOST=redis-service.florus-data.svc.cluster.local
      - REDIS_PORT=6379
      - REDIS_ENABLED=true
      - NEO4J_URI=bolt://neo4j-service.florus-data.svc.cluster.local:7687
      - NEO4J_USER=neo4j
      - NEO4J_ENABLED=true
      - KAFKA_BROKERS=kafka-service.florus-data.svc.cluster.local:9092
      - KAFKA_ENABLED=true
      - MINIO_ENDPOINT=minio-service.florus-data.svc.cluster.local:9000
      - MINIO_USE_SSL=false
      - MINIO_BUCKET=florus-staging
      - JWT_EXPIRATION_HOURS=24
      - JWT_ISSUER=florus-api-staging

secretGenerator:
  - name: florus-staging-secrets
    literals:
      - DB_PASSWORD=staging_password
      - JWT_SECRET=staging_jwt_secret_key_123
      - NEO4J_PASSWORD=florusneo4j123
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
