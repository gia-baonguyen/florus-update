apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: florus

resources:
  - ../../base
  - ../../data
  - ../../apps

commonLabels:
  environment: staging

images:
  - name: florus-backend
    newName: ghcr.io/your-org/florus-backend
    newTag: latest
  - name: florus-frontend
    newName: ghcr.io/your-org/florus-frontend
    newTag: latest

replicas:
  - name: backend
    count: 2
  - name: frontend
    count: 1

patches:
  # Reduce resource limits for staging
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi

configMapGenerator:
  - name: florus-config
    behavior: merge
    literals:
      - LOG_LEVEL=debug
      - GIN_MODE=debug
