# Kind cluster configuration for Florus local development
# Creates a 3-node cluster: 1 control-plane + 2 workers
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: florus-local

nodes:
  # Control plane node
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Ingress HTTP
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # Ingress HTTPS
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # NodePort range for services
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
      - containerPort: 30002
        hostPort: 30002
        protocol: TCP
      - containerPort: 30003
        hostPort: 30003
        protocol: TCP
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30081
        hostPort: 30081
        protocol: TCP
      # ArgoCD
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
      # Neo4j Browser
      - containerPort: 30474
        hostPort: 30474
        protocol: TCP
      # Neo4j Bolt
      - containerPort: 30687
        hostPort: 30687
        protocol: TCP
      # MinIO Console
      - containerPort: 30901
        hostPort: 30901
        protocol: TCP
      # Staging Frontend
      - containerPort: 30180
        hostPort: 30180
        protocol: TCP
      # Staging Backend
      - containerPort: 30181
        hostPort: 30181
        protocol: TCP
      # Production Frontend
      - containerPort: 30280
        hostPort: 30280
        protocol: TCP
      # Production Backend
      - containerPort: 30281
        hostPort: 30281
        protocol: TCP

  # Worker node 1
  - role: worker
    labels:
      node-type: data
    extraMounts:
      - hostPath: /tmp/florus-data
        containerPath: /data

  # Worker node 2
  - role: worker
    labels:
      node-type: app

# Networking
networking:
  # Use default CNI (kindnet)
  disableDefaultCNI: false
  # Pod subnet
  podSubnet: "10.244.0.0/16"
  # Service subnet
  serviceSubnet: "10.96.0.0/12"
