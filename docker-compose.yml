version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: florus-oracle
    ports:
      - "1522:1521"
    environment:
      - ORACLE_PASSWORD=florus123
      - APP_USER=florus
      - APP_USER_PASSWORD=florus123
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - florus-network

  redis:
    image: redis:7-alpine
    container_name: florus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - florus-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: florus-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    restart: unless-stopped
    networks:
      - florus-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: florus-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - florus-network

  # Apache Spark Cluster
  spark-master:
    image: apache/spark:3.5.0
    container_name: florus-spark-master
    depends_on:
      - minio
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - MINIO_ENDPOINT=http://florus-minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=florus-data
    ports:
      - "8090:8080"
      - "7077:7077"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - spark_data:/opt/spark/work
      - ./devops/spark/scripts:/scripts
      - ./devops/spark/jars:/jars
    networks:
      - florus-network
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.0
    container_name: florus-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=4G
      - MINIO_ENDPOINT=http://florus-minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=florus-data
    depends_on:
      - spark-master
      - minio
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - spark_data:/opt/spark/work
      - ./devops/spark/scripts:/scripts
      - ./devops/spark/jars:/jars
    networks:
      - florus-network
    restart: unless-stopped

  # MinIO for object storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: florus-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - florus-network

  # MLflow for model tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: florus-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    networks:
      - florus-network
    restart: unless-stopped

  # Neo4j Graph Database for recommendations
  neo4j:
    image: neo4j:5.15-community
    container_name: florus-neo4j
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/florusneo4j123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512m
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./devops/neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - florus-network
    restart: unless-stopped

volumes:
  oracle_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  spark_data:
  mlflow_data:
  minio_data:
  delta_data:
  neo4j_data:
  neo4j_logs:

networks:
  florus-network:
    driver: bridge
