version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: florus-oracle
    ports:
      - "1522:1521"
    environment:
      - ORACLE_PASSWORD=florus123
      - APP_USER=florus
      - APP_USER_PASSWORD=florus123
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  oracle_data:
